services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: carousell_alert_bot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d carousell_alert_bot"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  bot:
    build: .
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
      python -m carousell_alert_bot.main_bot"
    restart: unless-stopped
    volumes:
      - ./playwright_state:/app/state

  worker:
    build: .
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
      python -m carousell_alert_bot.main_worker"
    restart: unless-stopped
    volumes:
      - ./playwright_state:/app/state

volumes:
  postgres_data:

